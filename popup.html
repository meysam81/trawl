<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #fff;
        color: #1e1e2e;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      .logo {
        width: 22px;
        height: 22px;
        flex-shrink: 0;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      select {
        flex: 1;
        padding: 7px 10px;
        font-size: 12px;
        border: 1.5px solid #e2e2e8;
        border-radius: 6px;
        background: #fff;
        color: #1e1e2e;
        outline: none;
        cursor: pointer;
        transition: border-color 0.15s;
      }

      select:focus {
        border-color: #6366f1;
      }

      button {
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
        white-space: nowrap;
      }

      #run {
        background: #6366f1;
        color: #fff;
      }

      #run:hover {
        background: #4f46e5;
      }
      #run:active {
        background: #4338ca;
      }
      #run.loading {
        opacity: 0.7;
        cursor: wait;
      }

      .results {
        display: none;
      }

      .results.visible {
        display: block;
      }

      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .badge {
        font-size: 11px;
        font-weight: 600;
        color: #6366f1;
      }

      #copy {
        background: #f0f0f5;
        color: #4b4b5e;
        font-size: 11px;
        padding: 3px 8px;
      }

      #copy:hover {
        background: #e4e4ec;
      }
      #copy.copied {
        background: #6366f1;
        color: #fff;
      }

      #out {
        max-height: 260px;
        overflow-y: auto;
        font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        font-size: 11.5px;
        line-height: 1.6;
        color: #3b3b4f;
        background: #f8f8fb;
        border: 1px solid #ececf1;
        border-radius: 6px;
        padding: 8px 10px;
        white-space: pre-wrap;
        word-break: break-all;
      }

      #out::-webkit-scrollbar {
        width: 4px;
      }
      #out::-webkit-scrollbar-track {
        background: transparent;
      }
      #out::-webkit-scrollbar-thumb {
        background: #d0d0da;
        border-radius: 4px;
      }

      .empty {
        color: #9090a0;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <svg
        class="logo"
        viewBox="0 0 22 22"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="22" height="22" rx="5" fill="#6366f1" />
        <path
          d="M5 8l6 4.2L17 8M5 8v6h12V8H5z"
          stroke="#fff"
          stroke-width="1.4"
          stroke-linejoin="round"
        />
      </svg>
      <span class="title">Email Collector</span>
    </div>

    <div class="controls">
      <select id="mode">
        <option value="text">Visible text</option>
        <option value="html">Full HTML source</option>
      </select>
      <button id="run">Collect</button>
    </div>

    <div class="results" id="results">
      <div class="results-header">
        <span class="badge" id="count"></span>
        <button id="copy">Copy</button>
      </div>
      <pre id="out"></pre>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
